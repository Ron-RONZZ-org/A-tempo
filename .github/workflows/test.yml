name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install uv and Poetry
        run: pip install uv && uv tool install poetry

      - name: Install dependencies
        run: poetry config virtualenvs.in-project true && poetry install --no-interaction

      - name: Run tests
        run: uv run pytest -v

      - name: Run linter
        run: uv run ruff check src/ tests/

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install uv and Poetry
        run: pip install uv && uv tool install poetry

      - name: Install dependencies
        run: poetry config virtualenvs.in-project true && poetry install --no-interaction --with dev

      - name: Check formatting
        run: uv run ruff format --check src/ tests/

      - name: Check imports
        run: uv run ruff check src/ tests/